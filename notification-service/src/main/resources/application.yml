server:
  port: 8083

spring:
  application:
    name: notification-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/flashstream?useUnicode=true&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  kafka:
    bootstrap-servers: localhost:9091,localhost:9092,localhost:9093
    consumer:
      group-id: notification-consumer-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.flashstream.common.entity
        spring.json.value.default.type: com.flashstream.common.entity.OrderEvent
      enable-auto-commit: false
    listener:
      ack-mode: manual

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.flashstream: DEBUG
    org.apache.kafka: INFO
